<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Anggia & Nasa'i</title>
   
    <style>
        /* Menghilangkan sela putih di pinggir halaman */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mencegah double scrollbar */
        }
        .iframe-container {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        class="iframe-container"
        src="https://script.google.com/macros/s/AKfycbxPdd-2FN_78-VW_JHvkuMzBdEIs9PwkHwYqHr1wTkyH8dZdOMcR3HpSi8jKUyjbW5L/exec" 
        allowfullscreen="true" 
        webkitallowfullscreen="true" 
        mozallowfullscreen="true"
        scrolling="yes">
    </iframe>

    <script>
        // Mencoba masuk mode fullscreen otomatis saat dimuat
        window.onload = function() {
            const iframe = document.querySelector('iframe');
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen().catch(err => {
                    console.log("Fullscreen otomatis diblokir browser, pengguna harus klik manual.");
                });
            }
        };
    </script>
</body>
</html>
